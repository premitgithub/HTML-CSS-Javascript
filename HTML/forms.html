<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <!--forms-->
    <form action="/action">
      <input type="button" value="Learn more" />
      <button>pieces</button>
      <br />
      <input type="checkbox" value="File1" />
      <label >File1</label><br />

      <input  type="checkbox" value="File2 " />
      <label >File2</label><br />

      <label for="name">Name</label>
      <input id="name" type="text" name="name" value="" /><br />

      <label for="email">Email ID</label>
      <input id="email" name="emailid" type="email" value="" /><br />

      <label for="password">Password</label>
      <input id="password" type="password" value="" /><br />

      <label>Color</label>
      <input name="color" type="color" /><br />

      <label for="cars">Choose a car:</label>
      <select name="cars" id="cars">
        <option value="volvo">Volvo</option>
        <option value="audi">Audi</option>
        <option value="siat">Siat</option>
        <option value="mercedez">Mercedez</option>
      </select>
      <br /><br /><br />

      <label for="datetime">Datetime</label>
      <input id="datetime" type="datetime" /><br />

      <label for="file">FileNo1</label>
      <input id="file" type="file" /><br />

      <label for="url">URL</label>
      <input id="url" type="url" /><br />

      <label for="date">Date</label>
      <input id="date" type="date" /><br />

      <label for="no">Phone Number:</label>
      <input id="no" type="number" /><br />

      <input id="1st" name="Radio" type="radio" value="radio1" />
      <label for="1st">Radio1</label><br />

      <input id="2nd" name="Radio" type="radio" value="radio2"/>
      <label for="2nd">Radio2</label><br />

      <input id="3rd" name="Radio" type="radio" value="radio3"/>
      <label for="3rd">Radio3</label><br />

      <input id="4th" name="Radio" type="radio" value="radio4"/>
      <label for="4th">Radio4</label><br />

      <input type="submit" />
    </form>
  </body>
</html>
