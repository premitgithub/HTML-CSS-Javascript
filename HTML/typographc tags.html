<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typographic_tags</title>
  </head>
  <body>
    <p>
      You will only <strong>fail</strong> when you <strong>stop trying</strong>
    </p>
    <p>You will only <i>fail</i> when you <em>stop trying</em></p>
    <p>You will only <mark>fail</mark> when you <mark>stop trying</mark></p>
    <p><small>You will only fail when you stop trying</small></p>
    <p>You will only <del>fail</del> when you <del>stop trying</del></p>
    <p>You will only <ins>fail</ins> when you <ins>stop trying</ins></p>
    <p>Y = X<sup>3</sup> + X<sup>2</sup> + 1</p>
    <p>Z<sub>2</sub> = Y<sub>2</sub> + X<sub>2</sub></p>
  </body>
</html>
